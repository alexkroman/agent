<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dispatch Command Center</title>
    <style>
      :root {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body { background: #0a0a0f; color: #e2e8f0; }
      #app { display: flex; flex-direction: column; min-height: 100vh; }

      @keyframes dc-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
      @keyframes dc-slide-in { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

      /* Header */
      .dc-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 24px; gap: 16px; flex-wrap: wrap; flex-shrink: 0;
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        border-bottom: 1px solid #1e293b;
      }
      .dc-title {
        display: flex; align-items: center; gap: 10px;
        font-size: 18px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.05em; color: #f1f5f9;
      }
      .dc-dot { width: 10px; height: 10px; border-radius: 9999px; display: inline-block; background: #6b7280; }
      .dc-state-label { font-size: 11px; font-weight: 400; text-transform: none; color: #64748b; }
      .dc-alert-wrap { display: flex; gap: 8px; align-items: center; }
      .dc-alert-caption { font-size: 10px; letter-spacing: 0.05em; color: #64748b; }
      .dc-alert-badge {
        padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 700;
        text-transform: uppercase; letter-spacing: 0.05em; background: #22c55e; color: #fff;
      }

      /* Layout */
      .dc-main { flex: 1; display: grid; grid-template-columns: 1fr 320px; overflow: hidden; }
      .dc-feed-col { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid #1e293b; }
      @media (max-width: 900px) {
        .dc-main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      }

      /* Messages */
      .dc-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
      .dc-messages::-webkit-scrollbar, .dc-sidebar::-webkit-scrollbar { width: 6px; }
      .dc-messages::-webkit-scrollbar-thumb, .dc-sidebar::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
      .dc-empty { text-align: center; padding: 40px; font-size: 13px; color: #475569; }
      .dc-msg {
        border-radius: 8px; font-size: 13px; max-width: 85%; padding: 10px 14px;
        line-height: 1.6; animation: dc-slide-in 0.2s ease-out;
      }
      .dc-msg-assistant { align-self: flex-start; background: #1e293b; border-left: 3px solid #3b82f6; }
      .dc-msg-user { align-self: flex-end; background: #172554; border-right: 3px solid #22d3ee; }
      .dc-msg-role { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; color: #64748b; }

      /* Transcript + error */
      .dc-transcript {
        display: flex; align-items: center; padding: 8px 16px; font-size: 12px;
        font-style: italic; min-height: 32px; background: #111827;
        border-top: 1px solid #1e293b; color: #64748b;
      }
      .dc-live-dot { width: 10px; height: 10px; border-radius: 9999px; display: inline-block; margin-right: 8px; background: #22c55e; animation: dc-pulse 1.5s ease-in-out infinite; }
      .dc-error { padding: 8px 16px; font-size: 12px; background: #450a0a; color: #fca5a5; border-top: 1px solid #991b1b; }

      /* Controls */
      .dc-controls { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: #111827; border-top: 1px solid #1e293b; }
      .dc-btn {
        padding: 8px 16px; border: none; border-radius: 6px;
        font-family: inherit; font-size: 12px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer;
      }
      .dc-btn-primary { background: #2563eb; color: #fff; }
      .dc-btn-muted { background: #334155; color: #e2e8f0; }
      .dc-btn-danger { background: #dc2626; color: #fff; }
      .dc-count { font-size: 10px; color: #475569; }

      /* Sidebar */
      .dc-sidebar { overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; background: #111827; }
      .dc-panel { border-radius: 8px; padding: 12px; background: #1a1a2e; border: 1px solid #1e293b; }
      .dc-panel-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; color: #64748b; }
      .dc-stat { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; }
      .dc-stat > span:first-child { color: #94a3b8; }
      .dc-stat > span:last-child { font-weight: 700; color: #e2e8f0; }
      .dc-none { font-size: 12px; text-align: center; padding: 8px; color: #475569; }
      .dc-incident { border-radius: 6px; padding: 10px; margin-bottom: 8px; background: #0f172a; animation: dc-slide-in 0.3s ease-out; }
      .dc-incident-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
      .dc-incident-id { font-size: 12px; font-weight: 700; color: #f1f5f9; }
      .dc-incident-sev { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
      .dc-incident-loc { font-size: 11px; margin-bottom: 2px; color: #94a3b8; }
      .dc-incident-status { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
      .dc-legend { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
      .dc-swatch { width: 10px; height: 10px; border-radius: 2px; }
      .dc-legend > span:last-child { font-size: 11px; text-transform: capitalize; color: #94a3b8; }
      .dc-hint { font-size: 11px; line-height: 1.5; color: #64748b; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
