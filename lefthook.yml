pre-commit:
  commands:
    lint-staged:
      glob: "packages/**/*.{ts,tsx,js,mjs}"
      run: npx biome check --write {staged_files} && git add {staged_files}
    syncpack:
      glob: "**/package.json"
      run: pnpm run check:syncpack

pre-push:
  commands:
    no-push-main:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ] || [ "$branch" = "master" ]; then
          echo "Error: Direct pushes to $branch are not allowed. Use a PR."
          exit 1
        fi
    no-conflicts-with-main:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ] || [ "$branch" = "master" ]; then
          exit 0
        fi
        echo "Checking for merge conflicts with main..."
        git fetch origin main --quiet 2>/dev/null || {
          echo "Warning: Could not fetch origin/main — skipping conflict check."
          exit 0
        }
        # Try a merge in-memory (no worktree changes) using merge-tree
        base=$(git merge-base HEAD origin/main 2>/dev/null) || {
          echo "Warning: No common ancestor with main — skipping conflict check."
          exit 0
        }
        merge_result=$(git merge-tree "$base" HEAD origin/main 2>/dev/null)
        if echo "$merge_result" | grep -q "^<<<<<<<"; then
          echo ""
          echo "Error: This branch has merge conflicts with main."
          echo "Please rebase or merge main into your branch before pushing:"
          echo ""
          echo "  git fetch origin main"
          echo "  git rebase origin/main"
          echo ""
          echo "Then resolve any conflicts and try again."
          exit 1
        fi
        echo "No conflicts with main detected."
    changeset-status:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ] || [ "$branch" = "master" ]; then
          exit 0
        fi
        case "$branch" in changeset-release/*) exit 0 ;; esac
        # Unset GIT_DIR so changeset resolves the repo correctly in worktrees.
        # Git sets GIT_DIR during hooks, which confuses changeset's repo detection.
        unset GIT_DIR
        if pnpm changeset status --since=origin/main 2>&1; then
          exit 0
        fi
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "  Changeset required!"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "  Packages were changed but no changeset was found."
        echo ""
        echo "  Interactive (humans):"
        echo "    pnpm changeset"
        echo ""
        echo "  Non-interactive (agents/CI):"
        echo "    pnpm changeset:create --pkg <package> --bump patch --summary \"description\""
        echo ""
        echo "  No release needed (docs/tests/config only):"
        echo "    pnpm changeset add --empty"
        echo ""
        echo "  Then commit the changeset file and push again."
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        exit 1
    check:
      run: pnpm check
