app = 'aai-agent'
primary_region = 'sjc'

[build]
  dockerfile = "packages/aai-server/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  MAX_CONNECTIONS = "100"
  MAX_VMS = "10"
  # Pre-warm Deno/gVisor harnesses so first-session cold starts skip the
  # spawn → JIT → gVisor bootstrap path. Avoids CPU-starving healthchecks
  # on the 1-CPU VM.
  SANDBOX_POOL_SIZE = "2"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/health"

[deploy]
  strategy = "rolling"

[metrics]
  port = 8080
  path = "/metrics"

kill_signal = "SIGTERM"
kill_timeout = "10s"

[[vm]]
  memory = '2gb'
  cpu_kind = 'performance'
  cpus = 1
  scale = 5
