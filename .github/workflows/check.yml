name: Check

on:
  push:
    branches: [changeset-release/main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache TypeScript incremental build info
        uses: actions/cache@v5
        with:
          path: .tsbuildinfo/
          key: tsbuildinfo-build-${{ runner.os }}-${{ hashFiles('packages/*/tsconfig.json', 'tsconfig.json') }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            tsbuildinfo-build-${{ runner.os }}-${{ hashFiles('packages/*/tsconfig.json', 'tsconfig.json') }}-
            tsbuildinfo-build-${{ runner.os }}-
      - name: Cache Turborepo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm exec turbo run build
      - uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            .tsbuildinfo
            .turbo
          key: workspace-${{ runner.os }}-node${{ hashFiles('.node-version') }}-${{ github.sha }}

  lint-typecheck-and-checks:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            .tsbuildinfo
            .turbo
          key: workspace-${{ runner.os }}-node${{ hashFiles('.node-version') }}-${{ github.sha }}
      - run: pnpm exec turbo run lint typecheck
      - name: Check for changeset
        if: github.event_name == 'pull_request' && github.head_ref != 'changeset-release/main' && !contains(github.event.pull_request.labels.*.name, 'no-release')
        run: pnpm changeset status --since=origin/main
      - run: |
          pnpm exec turbo run check:attw check:typecheck
          pnpm run check:knip
          pnpm run check:syncpack
          pnpm run check:sherif
          pnpm run check:markdown

  # Unit tests sharded by package — run in parallel
  test:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [aai, aai-ui, aai-cli, aai-server, aai-templates]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            .tsbuildinfo
            .turbo
          key: workspace-${{ runner.os }}-node${{ hashFiles('.node-version') }}-${{ github.sha }}
      - run: pnpm --filter @alexkroman1/${{ matrix.package }} test:coverage

  integration:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows excluded: tsdown/rolldown can't resolve .ts exports in aai dist
        os: [ubuntu-latest, macos-latest]
        node: [24]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - id: workspace-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            .tsbuildinfo
            .turbo
          key: workspace-${{ runner.os }}-node${{ hashFiles('.node-version') }}-${{ github.sha }}
      - if: steps.workspace-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run build
      - run: pnpm exec turbo run check:integration

  docker-gvisor:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build gVisor test image
        run: >-
          docker build
          -f packages/aai-server/guest/Dockerfile.gvisor
          -t aai-gvisor-test .
      - name: Run gVisor integration tests
        run: >-
          docker run --rm --privileged
          aai-gvisor-test

  e2e:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows excluded: tsdown/rolldown can't resolve .ts exports in aai dist
        os: [ubuntu-latest, macos-latest]
        node: [24]
        pm: [pnpm, npm, yarn]
    env:
      AAI_TEST_PM: ${{ matrix.pm }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - id: workspace-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            .tsbuildinfo
            .turbo
          key: workspace-${{ runner.os }}-node${{ hashFiles('.node-version') }}-${{ github.sha }}
      - if: steps.workspace-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run build
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('packages/aai-cli/package.json') }}
      - run: pnpm --filter @alexkroman1/aai-cli exec playwright install --with-deps chromium
      - run: pnpm exec turbo run check:e2e

  # Single gate job for branch protection — add only "ci" as a required check
  ci:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-typecheck-and-checks, test, integration, e2e, docker-gvisor]
    steps:
      - name: Check results
        run: |
          results="${{ needs.lint-typecheck-and-checks.result }} ${{ needs.test.result }} ${{ needs.integration.result }} ${{ needs.e2e.result }} ${{ needs.docker-gvisor.result }}"
          for r in $results; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "CI failed: one or more jobs did not succeed"
              exit 1
            fi
          done
          echo "All CI jobs passed"
