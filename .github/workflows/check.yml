name: Check

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run build
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
          key: workspace-${{ github.sha }}

  lint-and-typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
          key: workspace-${{ github.sha }}
      - run: pnpm -r run lint & pnpm -r run typecheck & wait

  checks:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
          key: workspace-${{ github.sha }}
      - run: |
          pnpm -r run --if-present check:api
          pnpm -r run --if-present check:attw
          pnpm -r run --if-present check:templates
          pnpm run check:knip
          pnpm run check:syncpack
          pnpm run check:markdown

  test:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
          key: workspace-${{ github.sha }}
      - run: pnpm vitest run --coverage

  integration:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
          key: workspace-${{ github.sha }}
      - run: pnpm -r run --if-present check:integration

  e2e:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
          key: workspace-${{ github.sha }}
      - run: pnpm --filter @alexkroman1/aai-cli exec playwright install --with-deps chromium
      - run: pnpm -r run --if-present check:e2e

  # Single gate job for branch protection — add only "ci" as a required check
  ci:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-and-typecheck, checks, test, integration, e2e]
    steps:
      - name: Check results
        run: |
          results="${{ needs.lint-and-typecheck.result }} ${{ needs.checks.result }} ${{ needs.test.result }} ${{ needs.integration.result }} ${{ needs.e2e.result }}"
          for r in $results; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "CI failed: one or more jobs did not succeed"
              exit 1
            fi
          done
          echo "All CI jobs passed"
