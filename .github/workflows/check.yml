name: Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache TypeScript incremental build info
        uses: actions/cache@v5
        with:
          path: .tsbuildinfo/
          key: tsbuildinfo-build-${{ runner.os }}-${{ hashFiles('packages/*/tsconfig.json', 'tsconfig.json') }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            tsbuildinfo-build-${{ runner.os }}-${{ hashFiles('packages/*/tsconfig.json', 'tsconfig.json') }}-
            tsbuildinfo-build-${{ runner.os }}-
      - run: pnpm -r run build
      - uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            .tsbuildinfo
          key: workspace-node${{ hashFiles('.node-version') }}-${{ github.sha }}

  lint-and-typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            .tsbuildinfo
          key: workspace-node${{ hashFiles('.node-version') }}-${{ github.sha }}
      - run: pnpm --filter "...[origin/main]" run lint & pnpm --filter "...[origin/main]" run typecheck & wait

  checks:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            .tsbuildinfo
          key: workspace-node${{ hashFiles('.node-version') }}-${{ github.sha }}
      - run: |
          pnpm --filter "...[origin/main]" run --if-present check:attw
          pnpm run check:knip
          pnpm run check:syncpack
          pnpm run check:markdown

  # Unit tests sharded by package — run in parallel
  test:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [aai, aai-ui, aai-cli, aai-server, templates]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            .tsbuildinfo
          key: workspace-node${{ hashFiles('.node-version') }}-${{ github.sha }}
      - run: pnpm vitest run --project ${{ matrix.project }} --coverage

  integration:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            .tsbuildinfo
          key: workspace-node${{ hashFiles('.node-version') }}-${{ github.sha }}
      - run: pnpm vitest run -c vitest.integration.config.ts

  e2e:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/*/dist
            .tsbuildinfo
          key: workspace-node${{ hashFiles('.node-version') }}-${{ github.sha }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('packages/aai-cli/package.json') }}
      - run: pnpm --filter @alexkroman1/aai-cli exec playwright install --with-deps chromium
      - run: pnpm --filter "...[origin/main]" run --if-present check:e2e

  # Single gate job for branch protection — add only "ci" as a required check
  ci:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-and-typecheck, checks, test, integration, e2e]
    steps:
      - name: Check results
        run: |
          results="${{ needs.lint-and-typecheck.result }} ${{ needs.checks.result }} ${{ needs.test.result }} ${{ needs.integration.result }} ${{ needs.e2e.result }}"
          for r in $results; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              echo "CI failed: one or more jobs did not succeed"
              exit 1
            fi
          done
          echo "All CI jobs passed"
