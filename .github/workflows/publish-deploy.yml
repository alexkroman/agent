name: Publish & Deploy

on:
  push:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.check.outputs.publish }}
      deploy: ${{ steps.check.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for version changes
        id: check
        run: |
          publish=false
          deploy=false

          for pkg in packages/aai/package.json packages/aai-ui/package.json packages/aai-cli/package.json; do
            if git diff HEAD~1 HEAD -- "$pkg" | grep -q '"version"'; then
              publish=true
            fi
          done

          if git diff HEAD~1 HEAD -- packages/aai-server/package.json | grep -q '"version"'; then
            deploy=true
          fi

          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "deploy=$deploy" >> "$GITHUB_OUTPUT"

  publish:
    needs: detect-changes
    if: needs.detect-changes.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: turbo build

      - run: pnpm publish -r --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
