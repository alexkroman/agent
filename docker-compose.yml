services:
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/aai-agents --ignore-existing &&
      echo 'Bucket aai-agents ready'
      "

  server:
    build:
      context: .
      dockerfile: packages/aai-server/Dockerfile
    ports:
      - "8080"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      PORT: "8080"
      BUCKET_NAME: aai-agents
      AWS_ENDPOINT_URL_S3: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      KV_SCOPE_SECRET: docker-dev-secret
      MAX_CONNECTIONS: "100"
      SECURE_EXEC_V8_MAX_SESSIONS: "128"
    # Match Fly.io performance-cpu-1x@2048MB
    mem_limit: 2048m
    memswap_limit: 2048m
    cpus: 1

volumes:
  minio-data:
